  :root {
    --surface: #fcfcfb;
    --page: #f9f9f7;
    --ink: #0b0b0b;
    --ink2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --border: rgba(11,11,11,0.10);
    --accent: #e87ba4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --page: #0d0d0d; --ink: #ffffff; --ink2: #c3c2b7;
      --muted: #898781; --grid: #2c2c2a; --border: rgba(255,255,255,0.10);
      --accent: #d55181;
    }
  }
  :root[data-theme="dark"] {
    --surface: #1a1a19; --page: #0d0d0d; --ink: #ffffff; --ink2: #c3c2b7;
    --muted: #898781; --grid: #2c2c2a; --border: rgba(255,255,255,0.10);
    --accent: #d55181;
  }
  :root[data-theme="light"] {
    --surface: #fcfcfb; --page: #f9f9f7; --ink: #0b0b0b; --ink2: #52514e;
    --muted: #898781; --grid: #e1e0d9; --border: rgba(11,11,11,0.10);
    --accent: #e87ba4;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
      "Noto Sans KR", "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 48px 24px 60px; }

  .kicker {
    font-size: 12px; letter-spacing: 0.22em; color: var(--muted);
    text-transform: uppercase; margin: 0 0 10px;
  }
  h1 {
    font-family: "GowunBatang", "Nanum Myeongjo", "AppleMyungjo", Batang, serif;
    font-weight: 700; font-size: clamp(30px, 5.4vw, 44px);
    margin: 0 0 12px; letter-spacing: -0.01em;
  }
  .sub { font-size: 14.5px; color: var(--ink2); margin: 0; max-width: 62ch; line-height: 1.65; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px; margin-top: 38px;
  }
  .card {
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.10);
    border-color: var(--muted);
  }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .thumb {
    background: var(--grid);
    border-bottom: 1px solid var(--border);
  }
  .thumb img { width: 100%; height: auto; display: block; }
  .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .card-title { font-size: 16.5px; font-weight: 700; margin: 0; line-height: 1.4; }
  .card-desc { font-size: 13px; color: var(--ink2); margin: 0; line-height: 1.6; flex: 1; }
  .card-meta {
    font-size: 12px; color: var(--muted); margin-top: 6px;
    font-variant-numeric: tabular-nums; display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .card-meta .go { margin-left: auto; color: var(--accent); font-weight: 600; }

  .credit {
    margin: 44px 0 0; padding-top: 14px; font-size: 11.5px; color: var(--muted);
    border-top: 1px solid var(--grid); letter-spacing: 0.02em;
  }
  .credit b { color: var(--ink2); font-weight: 600; }
  .credit .handle { color: var(--muted); margin-left: 4px; text-decoration: none; }
  .credit .handle:hover { color: var(--ink2); text-decoration: underline; }
  .credit .handle::before { content: "· "; }

  .top-actions { position: absolute; top: 18px; right: 22px; }
  #themeBtn {
    border: 1px solid var(--border); background: var(--surface); color: var(--ink2);
    border-radius: 999px; width: 32px; height: 32px; cursor: pointer; font-size: 14px;
    line-height: 1; font-family: inherit;
  }
  #themeBtn:hover { border-color: var(--muted); color: var(--ink); }

  @media (max-width: 640px) {
    .wrap { padding: 40px 16px 48px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
<body>
<div class="top-actions"><button id="themeBtn" title="테마 전환">◐</button></div>
<div class="wrap">
  <p class="kicker">Chronology · Interactive Timelines</p>
  <h1>연대표</h1>
  <p class="sub">역사 속 인물들의 생애·전성기·주요 작품을 시대의 한 축 위에 그린
    인터랙티브 연대표 모음입니다. 연대표는 계속 추가됩니다.</p>

  <div class="grid" id="cards"></div>

  <p class="credit">기획·제작 — <b>이정원</b>
    <a class="handle" href="https://www.instagram.com/jayr.eyafterdawn" target="_blank" rel="noopener">@jayr.eyafterdawn</a></p>
</div>

<script>
// 새 연대표가 생기면 여기에 한 항목만 추가하면 됩니다.
const TIMELINES = [
  {
    href: "korea-literature/",
    title: "한국문학 근현대 작가 연대표",
    desc: "이광수부터 김초엽까지 — 개화기 신소설에서 오늘의 SF까지, 근현대 한국 문학 작가들을 한눈에.",
    people: "작가 178인",
    range: "1862 – 현재",
    img: "korea-literature/card.jpg",
  },
  {
    href: "world-literature/",
    title: "세계문학 고전 작가 연대표",
    desc: "호메로스부터 한강까지 — 고대 서사시에서 현대 소설까지, 세계문학의 고전 작가들을 한눈에.",
    people: "작가 174인",
    range: "BC 780 – 현재",
    img: "world-literature/card.jpg",
  },
  {
    href: "world-cinema/",
    title: "세계영화 거장 감독 연대표",
    desc: "멜리에스부터 오늘의 거장까지 — 영화의 발명에서 현재에 이르는 세계 영화 감독들을 한눈에.",
    people: "감독 136인",
    range: "1861 – 현재",
    img: "world-cinema/card.jpg",
  },
];

document.getElementById("cards").innerHTML = TIMELINES.map(t => `
  <a class="card" href="${t.href}">
    <div class="thumb"><img src="${t.img}" alt="${t.title} 미리보기" loading="lazy"></div>
    <div class="card-body">
      <h2 class="card-title">${t.title}</h2>
      <p class="card-desc">${t.desc}</p>
      <div class="card-meta">
        <span>${t.people}</span><span>·</span><span>${t.range}</span>
        <span class="go">연대표 보기 →</span>
      </div>
    </div>
  </a>`).join("");

// 테마 토글: 자동 → 다크 → 라이트 (localStorage 유지)
const order = ["auto", "dark", "light"];
let theme = localStorage.getItem("lit-landing-theme") || "auto";
function applyTheme() {
  if (theme === "auto") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("themeBtn").title =
    { auto: "테마: 자동(OS 설정)", dark: "테마: 다크", light: "테마: 라이트" }[theme];
}
document.getElementById("themeBtn").addEventListener("click", () => {
  theme = order[(order.indexOf(theme) + 1) % order.length];
  localStorage.setItem("lit-landing-theme", theme);
  applyTheme();
});
applyTheme();
</script>
</body>
</html>
